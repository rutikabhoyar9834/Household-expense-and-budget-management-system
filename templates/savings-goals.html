{% extends "base.html" %}

{% block title %}Savings Goals{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12 mb-4">
        <h1 class="display-5 fw-bold fade-in-up">
            <i class="fas fa-bullseye"></i> Financial Goals
        </h1>
    </div>
</div>

<div class="row">
    <div class="col-md-4">
        <div class="card fade-in-up">
            <div class="card-header">
                <i class="fas fa-plus"></i> Create New Goal
            </div>
            <div class="card-body">
                <form id="goalForm">
                    <div class="mb-3">
                        <label class="form-label">Goal Name *</label>
                        <input type="text" class="form-control" id="goalName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Target Amount *</label>
                        <input type="number" class="form-control" id="targetAmount" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Current Amount</label>
                        <input type="number" class="form-control" id="currentAmount" step="0.01" value="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Deadline *</label>
                        <input type="date" class="form-control" id="deadline" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-save"></i> Create Goal
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-8">
        <div class="card fade-in-up">
            <div class="card-header">
                <i class="fas fa-list"></i> Your Goals
            </div>
            <div class="card-body" id="goalsList">
                <div class="text-center">Loading goals...</div>
            </div>
        </div>
    </div>
</div>

<!-- Update Goal Modal -->
<div class="modal fade" id="updateGoalModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Update Goal Progress</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="updateGoalForm">
                    <input type="hidden" id="updateGoalId">
                    <div class="mb-3">
                        <label class="form-label">Add Amount</label>
                        <input type="number" class="form-control" id="addAmount" step="0.01" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="updateGoalProgress()">Update</button>
            </div>
        </div>
    </div>
</div>

<script>
let goals = [];

document.addEventListener('DOMContentLoaded', function() {
    loadGoals();

    $('#goalForm').on('submit', function(e) {
        e.preventDefault();
        createGoal();
    });
});
function loadGoals() {
    $.ajax({
        url: '/api/goals',
        method: 'GET',
        success: function(data) {
            goals = data;
            displayGoals();
        },
        error: function() {
            $('#goalsList').html('<div class="text-center">Error loading goals</div>');
        }
    });
}

function displayGoals() {
    const container = $('#goalsList');
    container.empty();
    
    if (goals.length === 0) {
        container.html('<div class="text-center">No goals created yet. Create your first goal!</div>');
        return;
    }
    
    goals.forEach(goal => {
        const percentage = goal.percentage;
        let progressClass = 'bg-success';
        let status = 'On Track';
        
        // Check if deadline is approaching
        const deadline = new Date(goal.deadline);
        const today = new Date();
        const daysLeft = Math.ceil((deadline - today) / (1000 * 60 * 60 * 24));
        
        if (daysLeft < 0) {
            status = 'Overdue';
            progressClass = 'bg-danger';
        } else if (percentage >= 100) {
            status = 'Completed';
            progressClass = 'bg-success';
        } else if (percentage >= 75) {
            status = 'Near Completion';
            progressClass = 'bg-info';
        } else if (daysLeft < 30) {
            status = 'Urgent';
            progressClass = 'bg-warning';
        }
        
        const goalCard = `
            <div class="goal-card">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div>
                        <h5 class="goal-title">${escapeHtml(goal.goal_name)}</h5>
                        <small class="goal-date">
                            <i class="fas fa-calendar"></i> Deadline: ${formatDate(goal.deadline)}
                            ${daysLeft > 0 ? `(${daysLeft} days left)` : daysLeft === 0 ? '(Today!)' : '(Overdue)'}
                        </small>
                    </div>
                    <span class="badge ${percentage >= 100 ? 'bg-success' : 'bg-primary'}">${status}</span>
                </div>
                
                <div class="goal-amount mb-2">
                    ${formatCurrency(goal.current_amount)} / ${formatCurrency(goal.target_amount)}
                </div>
                
                <div class="progress mb-3">
                    <div class="progress-bar ${progressClass}" role="progressbar" 
                         style="width: ${Math.min(percentage, 100)}%">
                        ${percentage.toFixed(1)}%
                    </div>
                </div>
                
                ${percentage < 100 ? `
                    <div class="d-flex justify-content-between">
                        <button class="btn btn-sm btn-primary" onclick="showUpdateModal(${goal.id})">
                            <i class="fas fa-plus"></i> Add Progress
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteGoal(${goal.id})">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                ` : `
                    <div class="alert alert-success mb-0">
                        <i class="fas fa-check-circle"></i> Congratulations! Goal achieved!
                    </div>
                `}
            </div>
        `;
        
        container.append(goalCard);
    });
}

function createGoal() {
    const data = {
        goal_name: $('#goalName').val(),
        target_amount: $('#targetAmount').val(),
        current_amount: $('#currentAmount').val(),
        deadline: $('#deadline').val()
    };
    
    $.ajax({
        url: '/api/goals',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify(data),
        success: function() {
            $('#goalForm')[0].reset();
            loadGoals();
            showNotification('Goal created successfully', 'success');
        },
        error: function() {
            showNotification('Error creating goal', 'error');
        }
    });
}

function showUpdateModal(goalId) {
    $('#updateGoalId').val(goalId);
    $('#addAmount').val('');
    $('#updateGoalModal').modal('show');
}

function updateGoalProgress() {
    const goalId = $('#updateGoalId').val();
    const addAmount = parseFloat($('#addAmount').val());
    const goal = goals.find(g => g.id == goalId);
    
    if (goal && !isNaN(addAmount) && addAmount > 0) {
        const newAmount = goal.current_amount + addAmount;
        
        $.ajax({
            url: `/api/goals/${goalId}`,
            method: 'PUT',
            contentType: 'application/json',
            data: JSON.stringify({ current_amount: newAmount }),
            success: function() {
                $('#updateGoalModal').modal('hide');
                loadGoals();
                showNotification('Goal progress updated successfully', 'success');
            },
            error: function() {
                showNotification('Error updating goal progress', 'error');
            }
        });
    } else {
        showNotification('Please enter a valid amount', 'error');
    }
}

function deleteGoal(goalId) {
    if (confirm('Are you sure you want to delete this goal?')) {
        $.ajax({
            url: `/api/goals/${goalId}`,
            method: 'DELETE',
            success: function() {
                loadGoals();
                showNotification('Goal deleted successfully', 'success');
            },
            error: function() {
                showNotification('Error deleting goal', 'error');
            }
        });
    }
}

function formatCurrency(amount) {
    return new Intl.NumberFormat('en-IN', {
        style: 'currency',
        currency: 'INR'
    }).format(amount);
}

function formatDate(dateString) {
    const date = new Date(dateString);
    return date.toLocaleDateString('en-IN');
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function showNotification(message, type) {
    const alertDiv = $(`
        <div class="alert alert-${type} alert-dismissible fade show position-fixed top-0 end-0 m-3" style="z-index: 9999;" role="alert">
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    `);
    $('body').append(alertDiv);
    setTimeout(() => alertDiv.alert('close'), 3000);
}
</script>
{% endblock %}
