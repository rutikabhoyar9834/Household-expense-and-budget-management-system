{% extends "base.html" %}

{% block title %}Expense Management{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12 mb-4">
        <h1 class="display-5 fw-bold fade-in-up">
            <i class="fas fa-minus-circle"></i> Expense Management
        </h1>
    </div>
</div>

<div class="row">
    <div class="col-md-4">
        <div class="card fade-in-up">
            <div class="card-header">
                <i class="fas fa-plus"></i> Add New Expense
            </div>
            <div class="card-body">
                <form id="expenseForm">
                    <div class="mb-3">
                        <label class="form-label">Amount *</label>
                        <input type="number" class="form-control" id="amount" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Category *</label>
                        <select class="form-select" id="category" required>
                            <option value="Food">Food & Dining</option>
                            <option value="Rent">Rent</option>
                            <option value="Electricity">Electricity</option>
                            <option value="Water">Water</option>
                            <option value="Internet">Internet</option>
                            <option value="Travel">Travel</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Healthcare">Healthcare</option>
                            <option value="Education">Education</option>
                            <option value="Entertainment">Entertainment</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Date *</label>
                        <input type="date" class="form-control" id="date" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" id="description" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-save"></i> Add Expense
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-8">
        <div class="card fade-in-up">
            <div class="card-header">
                <i class="fas fa-list"></i> Expense History
                <div class="float-end">
                    <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Search...">
                </div>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover" id="expenseTable">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Category</th>
                                <th>Description</th>
                                <th>Amount</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="expenseTableBody">
                            <tr>
                                <td colspan="5" class="text-center">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editExpenseModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Expense</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editExpenseForm">
                    <input type="hidden" id="editExpenseId">
                    <div class="mb-3">
                        <label class="form-label">Amount</label>
                        <input type="number" class="form-control" id="editAmount" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select class="form-select" id="editCategory" required>
                            <option value="Food">Food & Dining</option>
                            <option value="Rent">Rent</option>
                            <option value="Electricity">Electricity</option>
                            <option value="Water">Water</option>
                            <option value="Internet">Internet</option>
                            <option value="Travel">Travel</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Healthcare">Healthcare</option>
                            <option value="Education">Education</option>
                            <option value="Entertainment">Entertainment</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Date</label>
                        <input type="date" class="form-control" id="editDate" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" id="editDescription" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="updateExpense()">Update</button>
            </div>
        </div>
    </div>
</div>

<script>
let allExpenses = [];

document.addEventListener('DOMContentLoaded', function() {
    loadExpenses();
    $('#date').val(new Date().toISOString().split('T')[0]);

    $('#expenseForm').on('submit', function(e) {
        e.preventDefault();
        addExpense();
    });

    $('#searchInput').on('keyup', function() {
        filterExpenses();
    });
});

function loadExpenses() {
    $.ajax({
        url: '/api/expenses',
        method: 'GET',
        success: function(data) {
            allExpenses = data;
            updateExpenseTable(data);
        },
        error: function() {
            $('#expenseTableBody').html('<tr><td colspan="5" class="text-center">Error loading data</td></tr>');
        }
    });
}

function filterExpenses() {
    const searchTerm = $('#searchInput').val().toLowerCase();
    const filtered = allExpenses.filter(expense => 
        expense.category.toLowerCase().includes(searchTerm) ||
        (expense.description && expense.description.toLowerCase().includes(searchTerm))
    );
    updateExpenseTable(filtered);
}

function updateExpenseTable(expenses) {
    const tbody = $('#expenseTableBody');
    tbody.empty();
    
    if (expenses.length === 0) {
        tbody.html('<tr><td colspan="5" class="text-center">No expense records found</td></tr>');
        return;
    }
    
    expenses.forEach(item => {
        const row = `
            <tr>
                <td>${formatDate(item.date)}</td>
                <td>${item.category}</td>
                <td>${item.description || '-'}</td>
                <td class="text-danger">${formatCurrency(item.amount)}</td>
                <td>
                    <button class="btn btn-sm btn-warning" onclick="editExpense(${item.id})">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="btn btn-sm btn-danger" onclick="deleteExpense(${item.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>
            </tr>
        `;
        tbody.append(row);
    });
}

function addExpense() {
    const data = {
        amount: $('#amount').val(),
        category: $('#category').val(),
        date: $('#date').val(),
        description: $('#description').val()
    };
    
    $.ajax({
        url: '/api/expenses',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify(data),
        success: function() {
            $('#expenseForm')[0].reset();
            $('#date').val(new Date().toISOString().split('T')[0]);
            loadExpenses();
            showNotification('Expense added successfully', 'success');
        },
        error: function() {
            showNotification('Error adding expense', 'error');
        }
    });
}

function editExpense(id) {
    const item = allExpenses.find(e => e.id === id);
    if (item) {
        $('#editExpenseId').val(item.id);
        $('#editAmount').val(item.amount);
        $('#editCategory').val(item.category);
        $('#editDate').val(item.date);
        $('#editDescription').val(item.description);
        $('#editExpenseModal').modal('show');
    }
}

function updateExpense() {
    const id = $('#editExpenseId').val();
    const data = {
        amount: $('#editAmount').val(),
        category: $('#editCategory').val(),
        date: $('#editDate').val(),
        description: $('#editDescription').val()
    };
    
    $.ajax({
        url: `/api/expenses/${id}`,
        method: 'PUT',
        contentType: 'application/json',
        data: JSON.stringify(data),
        success: function() {
            $('#editExpenseModal').modal('hide');
            loadExpenses();
            showNotification('Expense updated successfully', 'success');
        },
        error: function() {
            showNotification('Error updating expense', 'error');
        }
    });
}

function deleteExpense(id) {
    if (confirm('Are you sure you want to delete this expense?')) {
        $.ajax({
            url: `/api/expenses/${id}`,
            method: 'DELETE',
            success: function() {
                loadExpenses();
                showNotification('Expense deleted successfully', 'success');
            },
            error: function() {
                showNotification('Error deleting expense', 'error');
            }
        });
    }
}

function formatCurrency(amount) {
    return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD'
    }).format(amount);
}

function formatDate(dateString) {
    const date = new Date(dateString);
    return date.toLocaleDateString('en-US');
}

function showNotification(message, type) {
    const alertDiv = $(`
        <div class="alert alert-${type} alert-dismissible fade show position-fixed top-0 end-0 m-3" style="z-index: 9999;" role="alert">
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    `);
    $('body').append(alertDiv);
    setTimeout(() => alertDiv.alert('close'), 3000);
}
</script>
{% endblock %}
